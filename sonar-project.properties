# sonar-project.properties

sonar.projectKey=devops-portfolio-mern
sonar.projectName=DevOps Portfolio MERN
sonar.projectVersion=2.0

# Sources à analyser (backend uniquement pour éviter les issues frontend)
sonar.sources=backend/src,backend/server.js

# Dossiers de tests (exclus des métriques de code source)
sonar.tests=backend/src/__tests__

# Fichiers à exclure
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/uploads/**,\
  **/public/**,\
  backend/scripts/**,\
  frontend/**

# Exclure certains fichiers backend du coverage
sonar.coverage.exclusions=\
  backend/server.js,\
  backend/src/config/**,\
  backend/src/middleware/upload.js,\
  backend/scripts/**

# Coverage LCOV généré par Jest
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
