# ── Identification du projet ────────────────────────────────────────
sonar.projectKey=devops-portfolio-mern
sonar.projectName=DevOps Portfolio MERN
sonar.projectVersion=1.0

# ── Sources à analyser ──────────────────────────────────────────────
# On analyse backend ET frontend depuis la racine
sonar.sources=backend/src,backend/server.js,frontend/src

# ── Fichiers à exclure de l'analyse ─────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/uploads/**,\
  **/public/**,\
  backend/scripts/**

# ── Encodage ────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8