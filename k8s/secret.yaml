# k8s/secret.yaml
#
# Le Secret stocke les données sensibles encodées en base64.
#
# ⚠️  IMPORTANT — Ce fichier NE DOIT PAS être commité tel quel sur GitHub.
#     En production, on utilise :
#       - Sealed Secrets (Bitnami)
#       - External Secrets Operator
#       - HashiCorp Vault
#     Pour ce portfolio local, on le génère manuellement.
#
# ⚠️  base64 N'EST PAS du chiffrement — c'est juste un encodage.
#     K8s encode en base64 pour gérer les caractères spéciaux, pas pour sécuriser.
#
# Commande pour générer une valeur base64 :
#   echo -n "ma-valeur-secrete" | base64
#
# Commande pour décoder :
#   echo "dmFsZXVy" | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: mern-secret
  namespace: devops-portfolio
  labels:
    app: devops-portfolio-mern
type: Opaque
data:
  # JWT_SECRET — clé de signature des tokens JWT
  # Valeur originale : "devops_jwt_secret_portfolio"
  # Générer la tienne : echo -n "TON_SECRET" | base64
  JWT_SECRET: e0FRQUFBQkFBQUFBUWdsT0tBdzY1U1JoQ2U0L2o2bTQvaW1OQUYrV3lGcTM5OGxIUjY2WUR2MFk9fQ==

  # MONGO_PASSWORD — mot de passe MongoDB
  # Valeur originale : "devops_mongo_password_2026"
  MONGO_PASSWORD: bW9uZ28yMDI2

  # MONGO_URI — URI de connexion complète pour le backend
  # Valeur originale : "mongodb://mongo-service:27017/devops-portfolio"
  # Note : "mongo-service" = nom du Service K8s MongoDB (défini plus tard)
  MONGO_URI: bW9uZ29kYjovL21vbmdvLXNlcnZpY2U6MjcwMTcvZmlscm91Z2U=
