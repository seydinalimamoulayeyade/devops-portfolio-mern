server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy /api vers le backend Express
  # BACKEND_HOST est défini via variable d'environnement :
  # - Docker Compose: BACKEND_HOST=backend
  # - Kubernetes: BACKEND_HOST=backend-service
  location /api {
    proxy_pass http://${BACKEND_HOST}:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;
  }

  # Proxy /uploads vers le backend pour les images
  location /uploads {
    proxy_pass http://${BACKEND_HOST}:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA routing — toutes les routes renvoient index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets statiques avec cache long
  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}