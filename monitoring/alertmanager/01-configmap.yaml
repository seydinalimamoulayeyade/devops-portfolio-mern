# Configuration d'Alertmanager.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      # Délai après lequel une alerte non re-déclenchée est considérée "résolue"
      resolve_timeout: 5m

    # ── route : l'arbre de décision pour AIGUILLER les alertes ──────────────
    route:
      receiver: 'default'        # destination par défaut
      group_by: ['alertname']    # regroupe les alertes du même nom en 1 notification
      group_wait: 10s            # attend 10s avant la 1re notification (laisse le temps de grouper)
      group_interval: 30s        # délai avant d'envoyer des nouveautés d'un groupe existant
      repeat_interval: 1h        # ré-envoie une alerte toujours active au plus toutes les heures

    # ── receivers : les destinations possibles ──────────────────────────────
    receivers:
      # Pour l'instant, un receiver "vide" : les alertes arrivent dans l'UI
      # d'Alertmanager mais ne partent vers aucun canal externe.
      # On ajoutera Slack/email (avec un secret) à l'étape suivante.
      - name: 'default'
