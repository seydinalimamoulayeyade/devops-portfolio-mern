apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    # Recreate : arrête l'ancien pod avant d'en créer un nouveau.
    # Évite d'avoir besoin du double de ressources (cluster mono-node chargé).
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            # Identifiants admin (LOCAL / apprentissage uniquement).
            # En production : passer par un Secret Kubernetes.
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          ports:
            - name: web
              containerPort: 3000
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          volumeMounts:
            # La data source provisionnée (montée au bon endroit attendu par Grafana)
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            # Le provider de dashboards (dit à Grafana où chercher les JSON)
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            # Les dashboards eux-mêmes (fichiers JSON)
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
